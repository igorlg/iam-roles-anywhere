# CloudFormation - Validate and lint SAM/CloudFormation templates
#
# Runs on every push to feature branches (path-filtered).

name: CloudFormation

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'src/iam_ra_cli/data/cloudformation/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/cloudformation.yaml'

jobs:
  validate:
    name: Validate Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint CloudFormation templates
        run: uv run cfn-lint src/iam_ra_cli/data/cloudformation/*.yaml
